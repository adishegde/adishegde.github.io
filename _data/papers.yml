2021:
  - title: "SoK: Efficient Privacy-preserving Clustering"
    authors:
      - Aditya Hegde
      - Helen Möllering
      - Thomas Schneider
      - Hossein Yalame
    venue: PETS
    resources:
      eprint: "https://eprint.iacr.org/2021/809.pdf"
      code: "https://github.com/encryptogroup/SoK_ppClustering"
    summary: |
      In this paper we survey prior works on privacy-preserving clustering.
      We evaluate the performance of the state-of-the-art protocols and discuss their limitations for real-world applications.
      We also discuss current open challenges in practical privacy-preserving clustering to set the stage for future research.

  - title: Enhancing Z-resolution in CT Volumes with Deep Residual Learning
    authors:
      - Utkarsh Agrawal
      - Aditya Hegde
      - Rajesh Langoju
      - Prasad Sudhakar
      - Bhushan D. Patil
      - Sundar R. K.
      - Yasuhiro Imai
      - Risa Shigemasa
      - Omi Yasuo
      - Bipul Das
    leadauth: 1
    venue: SPIE
    resources:
      paper: "https://doi.org/10.1117/12.2581273"
    summary: |
      CT systems with large detector size suffer from lower z-resolution leading to pixelated images and inability to detect small structures thus adversely impacting the diagnosis and screening.
      In this work, we propose a supervised deep learning method for z-resolution enhancement such that (a) the effective SSP of resulting image is reduced, (b) quantitative values of tissue (CT numbers) and tissue-contrast are preserved; (c) there is very limited noise enhancement and (d) there is an improved tissue interface in bone/soft tissue.

2020:
  - title: High Throughput Secure MPC Over Small Population in Hybrid Networks (Extended Abstract)
    authors:
      - Ashish Choudhury
      - Aditya Hegde
    venue: INDOCRYPT
    resources:
      paper: CH20.pdf
      video: https://www.youtube.com/watch?v=ZieL6CZHmUo
    summary: |
      Prior works on efficient MPC over small population have mainly considered synchronous networks.
      However, the synchronous model makes strong assumptions of the underlying network and is not suitable for real-life networks like the Internet.
      In this work we initiate a study of high-throughput 4-party MPC protocols in the partially synchronous and asynchronous settings.
      Our work partially answers one of the open problems of Patra and Ravi (IEEE Transactions on Information Theory, 2018) to design a perfectly secure MPC protocol over partially synchronous networks with 2 initial synchronous rounds.

  - title: "Ethics, Prosperity, and Society: Moral Evaluation Using Virtue Ethics and Utilitarianism"
    authors:
      - Aditya Hegde
      - Vibhav Agarwal
      - Shrisha Rao
    leadauth: 2
    venue: IJCAI
    resources:
      paper: "https://www.ijcai.org/Proceedings/2020/0024.pdf"
    summary: |
      We propose a framework for agent based modeling that captures both, ethical decision making as well as evaluation using virtue ethics and utilitarianism.
      Our simulations show that unethical agents make short term gains but are less prosperous in the long run.
      We find that unethical agents have high incentive to become ethical in societies which strongly reward ethical behavior.
      The opposite is true of societies which strongly penalize unethical behavior.
