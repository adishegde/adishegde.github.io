2022:
  - title: "Attaining GOD Beyond Honest Majority with Friends and Foes"
    authors:
      - Aditya Hegde
      - Nishat Koti
      - Varsha Bhat Kukkala
      - Shravani Patil
      - Arpita Patra
      - Protik Paul
    venue: ASIACRYPT
    resources:
      code: "https://github.com/cris-iisc/quadsquad"
      eprint: "https://eprint.iacr.org/2022/1207"

  - title: "Secure Multiparty Computation with Free Branching"
    authors:
      - Aarushi Goel
      - Mathias Hall-Andersen
      - Aditya Hegde
      - Abhishek Jain
    venue: EUROCRYPT
    resources:
      code: "https://github.com/rot256/research-branching-mpc"
      video: "https://www.youtube.com/watch?v=95F1nlj8jjg"
    summary: |
      <b>Can we construct n-party MPC protocols for conditional circuits that have a communication complexity independent of the number of branches?</b>
      We present compilers that can transform a large class of generic MPC protocols into those for conditional circuits which achieve communication complexity independent of the number of branches and linear in the size of the largest branch.
      We discuss construction of semi-honest constant round protocols, and semi-honest and malicious non-constant round protocols.

2021:
  - title: "SoK: Efficient Privacy-preserving Clustering"
    authors:
      - Aditya Hegde
      - Helen Möllering
      - Thomas Schneider
      - Hossein Yalame
    venue: PETS
    resources:
      eprint: "https://eprint.iacr.org/2021/809.pdf"
      code: "https://github.com/encryptogroup/SoK_ppClustering"
    summary: |
      <b>What are the current approaches for privacy-preserving clustering and are they suitable for real-life application?</b>
      We survey prior works on privacy-preserving clustering and summarize the approach used to design secure clustering protocols.
      We evaluate the state-of-the-art protocols and discuss their limitations for real-world applications with respect to efficiency and quality of clustering.
      We also discuss current open challenges in applying current privacy-preserving clustering protocols when compared to their plaintext variants to set the stage for future research.

  - title: Enhancing Z-resolution in CT Volumes with Deep Residual Learning
    authors:
      - Utkarsh Agrawal
      - Aditya Hegde
      - Rajesh Langoju
      - Prasad Sudhakar
      - Bhushan D. Patil
      - Sundar R. K.
      - Yasuhiro Imai
      - Risa Shigemasa
      - Omi Yasuo
      - Bipul Das
    leadauth: 1
    venue: SPIE
    resources:
      paper: "https://doi.org/10.1117/12.2581273"
    summary: |
      <b>Can machine learning help enhance scans from CT systems with large detector sizes to better help with diagnosis?</b>
      We propose a supervised deep learning approach, based on GANs, that preserves tissues and tissue-contrast and improves tissue interface in bone/soft tissue while limiting noise enhancement.

2020:
  - title: High Throughput Secure MPC Over Small Population in Hybrid Networks (Extended Abstract)
    authors:
      - Ashish Choudhury
      - Aditya Hegde
    venue: INDOCRYPT
    resources:
      paper: CH20.pdf
      video: https://www.youtube.com/watch?v=ZieL6CZHmUo
    summary: |
      <b>How can we design efficient MPC protocols for a small number of parties that make minimal synchrony assumptions about the network?</b>
      We discuss high-throughput 4-party MPC protocols in the partially synchronous and asynchronous settings making a step towards constructing efficient protocols in this setting.
      Our work partially answers one of the open problems of PR18 to design a perfectly secure MPC protocol over partially synchronous networks with 2 initial synchronous rounds.

  - title: "Ethics, Prosperity, and Society: Moral Evaluation Using Virtue Ethics and Utilitarianism"
    authors:
      - Aditya Hegde
      - Vibhav Agarwal
      - Shrisha Rao
    leadauth: 2
    venue: IJCAI
    resources:
      paper: "https://www.ijcai.org/Proceedings/2020/0024.pdf"
    summary: |
      <b>Can we incorporate ethical decision making and its impact on reputation in agent based models?</b>
      We propose a framework that attempts to model reputation and ethics using virtue ethics and utilitarianism.
      Our simulations show that unethical agents make short term gains but are less prosperous in the long run.
      We find that unethical agents have high incentive to become ethical in societies which strongly reward ethical behavior.
      The opposite is true of societies which strongly penalize unethical behavior.
